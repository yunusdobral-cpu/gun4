<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yapılacaklar</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Yapılacaklar</h1>

        <div id="auth-section">
            <div id="auth-forms">
                <div class="auth-tabs">
                    <button class="auth-tab active" data-tab="login">Giriş Yap</button>
                    <button class="auth-tab" data-tab="register">Kayıt Ol</button>
                </div>
                <form id="login-form" class="auth-form">
                    <input type="email" id="login-email" placeholder="E-posta" required>
                    <input type="password" id="login-password" placeholder="Şifre (min 6 karakter)" required minlength="6">
                    <button type="submit">Giriş Yap</button>
                </form>
                <form id="register-form" class="auth-form hidden">
                    <input type="email" id="register-email" placeholder="E-posta" required>
                    <input type="password" id="register-password" placeholder="Şifre (min 6 karakter)" required minlength="6">
                    <button type="submit">Kayıt Ol</button>
                </form>
            </div>
            <div id="auth-message" class="hidden"></div>
        </div>

        <div id="app-section" class="hidden">
            <div id="user-bar">
                <span id="user-email"></span>
                <button id="logout-btn">Çıkış</button>
            </div>
            <form id="todo-form">
                <input type="text" id="todo-input" placeholder="Yeni görev ekle..." autofocus>
                <button type="submit">Ekle</button>
            </form>
            <ul id="todo-list"></ul>
            <div id="footer" class="hidden">
                <span id="count"></span>
                <button id="clear-done">Tamamlananları Sil</button>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
